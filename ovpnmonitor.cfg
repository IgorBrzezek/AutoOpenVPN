[general]
# Application name displayed in top status bar
app_name = OVPNMonitor
# Version string
version = 0.0.2a
# Author
author = Igor Brzezek
# Background fill character (DOS-style), e.g.  ░ ▒ ▓ · ° #
# Leave empty or space for solid background
background_char = ▒
# Screen refresh interval in seconds (1-5, default 1)
refresh_interval_s = 1
# Refresh interval for UI in milliseconds (derived from refresh_interval_s)
refresh_interval_ms = 1000
# VPN interface name (auto = auto-detect TAP/TUN adapter)
vpn_interface = auto
# Log file path (empty = no logging)
log_file =
# Local interface name (empty = auto-detect, "all" = all interfaces)
local_interface =
# Target IP for path ping / traceroute monitoring (empty = disabled)
pathping_target =

[colors]
# Color pairs: foreground,background
# Available colors: black, red, green, yellow, blue, magenta, cyan, white
# Background color for entire screen
background = black
status_bar_top = white,blue
status_bar_bottom = white,blue
border = cyan,black
border_title = yellow,black
text_normal = white,black
text_label = cyan,black
text_value = green,black
text_warning = yellow,black
text_error = red,black
online = green,white
offline = red,white
highlight = black,cyan
popup_border = yellow,black
popup_bg = white,black
# Window interior background color (black, blue, green, cyan, red, magenta, yellow, white)
window_bgcolor = black
# Ping latency color pairs
ping_ok = green,black
ping_warn = yellow,black
ping_high = yellow,black
ping_bad = blue,black
ping_worse = magenta,black
ping_critical = red,black
ping_dead = red,black

[network]
# Public IP check URL
ip_check_url = https://api.ipify.org

# Public IP check interval in seconds
ip_check_interval = 5

# Set to false to disable ping monitoring entirely
ping_enabled = true

# Ping targets: one per line, format: address,interval_ms
# Use "gateway" as address for auto-detected VPN gateway
ping_target_1 = gateway,5000
ping_target_2 = 8.8.8.8,5000
ping_target_3 = 1.1.1.1,5000

# Ping timeout in milliseconds (for Windows ping -w flag)
ping_timeout_ms = 2000

# Traffic stats interval in seconds
traffic_interval = 1

# Gateway detection interval in seconds
gateway_interval = 1

# VPN status check interval in seconds
vpn_check_interval = 1

# Local interface(s) interval in seconds
int_check_interval = 1

# Ping latency thresholds (ms)
ping_ok_ms = 25
ping_warn_ms = 50
ping_high_ms = 100
ping_bad_ms = 200
ping_worse_ms = 300
ping_critical_ms = 500

[keys]
# Keyboard shortcuts (single character)
quit = q
help = h
info = i
refresh_ip = u
toggle_pause = p
toggle_ping = n
show_routes = r

[addroute]
# Route to add when VPN connects (used by autoovpn.py --addroute)
# Format: NET/MASK,GATEWAY (e.g. 192.168.53.0/24,10.10.10.1)
# The route is added after OpenVPN connects and removed on disconnect
route =

[display]
# Ping progress bar width in characters (script adjusts window width automatically)
ping_bar_width = 25
# Border style: single or double (unicode box drawing)
border_style = double
