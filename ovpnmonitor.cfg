[general]
# Application name displayed in top status bar
app_name = OVPNMonitor
# Version string
version = 0.0.3
# Author
author = Igor Brzezek
# Background fill character (DOS-style), e.g.  ░ ▒ ▓ · ° #
# Leave empty or space for solid background
background_char = ▒
# Screen refresh interval in seconds (1-5, default 1)
refresh_interval_s = 1
# Refresh interval for UI in milliseconds (derived from refresh_interval_s)
refresh_interval_ms = 1000
# VPN interface name (auto = auto-detect TAP/TUN adapter)
vpn_interface = auto
# Log file path (empty = no logging)
log_file =
# Local interface name (empty = auto-detect, "all" = all interfaces)
local_interface =
# Target IP for path ping / traceroute monitoring (empty = disabled)
pathping_target =
# Show public IP address in top bar by default (true/false)
show_public_ip = false

[colors]
# Color pairs: foreground,background
# Colors can be names (black, red, green, yellow, blue, magenta, cyan, white, orange)
# or hex RGB (#RRGGBB) — on supporting terminals these define custom colors.
# Background color for entire screen
background = #000000
status_bar_top = #FFFFFF,#0000FF
status_bar_bottom = #FFFFFF,#0000FF
border = #00FFFF,#000000
border_title = #FFFF00,#000000
text_normal = #FFFFFF,#000000
text_label = #00FFFF,#000000
text_value = #00FF00,#000000
text_warning = #FFFF00,#000000
text_error = #FF0000,#000000
online = #00FF00,#FFFFFF
offline = #FF0000,#FFFFFF
highlight = #000000,#00FFFF
popup_border = #FFFF00,#000000
popup_bg = #FFFFFF,#000000
# Window interior background color
window_bgcolor = #000000
# Public IP bar color (in top status bar)
public_ip_bar = #FFFFFF,#0000FF
# Traceroute popup border
traceroute_border = #FFFF00,#000000
# Traceroute popup interior background
traceroute_bg = #FFFFFF,#000000
# Traceroute input field background (orange by default)
traceroute_input = white,orange
# Ping latency color pairs
ping_ok = green,black
ping_warn = yellow,black
ping_high = yellow,black
ping_bad = blue,black
ping_worse = magenta,black
ping_critical = red,black
ping_dead = red,black

[network]
# Public IP check URL
ip_check_url = https://checkip.amazonaws.com

# Public IP check interval in seconds
ip_check_interval = 5

# Set to false to disable ping monitoring entirely
ping_enabled = true

# Ping targets: one per line, format: address,interval_ms
# Use "gateway" as address for auto-detected VPN gateway
ping_target_1 = gateway,5000
ping_target_2 = 8.8.8.8,5000
ping_target_3 = 1.1.1.1,5000

# Ping timeout in milliseconds (for Windows ping -w flag)
ping_timeout_ms = 2000

# Traffic stats interval in seconds
traffic_interval = 1

# Gateway detection interval in seconds
gateway_interval = 1

# VPN status check interval in seconds
vpn_check_interval = 1

# Local interface(s) interval in seconds
int_check_interval = 1

# Ping latency thresholds (ms)
ping_ok_ms = 25
ping_warn_ms = 50
ping_high_ms = 100
ping_bad_ms = 200
ping_worse_ms = 300
ping_critical_ms = 500

[keys]
# Keyboard shortcuts (single character)
quit = q
help = h
info = i
refresh_ip = u
toggle_pause = p
toggle_ping = n
show_routes = r
toggle_ip = a
traceroute = t

[display]
# Ping progress bar width in characters (script adjusts window width automatically)
ping_bar_width = 25
# Border style: single or double (unicode box drawing)
border_style = double
# Public IP prefix character (shown before IP in top bar)
public_ip_char = ░
# Traceroute input field fill character (leave empty for space, or use e.g. ░)
traceroute_input_char =
# Traceroute input field width (full IP + padding)
traceroute_input_width = 17
