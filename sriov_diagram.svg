<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowDirect" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arrowControl" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8EAF6"/>
      <stop offset="100%" style="stop-color:#C5CAE9"/>
    </linearGradient>
    <linearGradient id="hyperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="vmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#1B2631"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="640" y="36" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="bold" fill="#1A237E">Schemat wirtualizacji SR-IOV (Single Root I/O Virtualization)</text>

  <!-- ============================================================ -->
  <!-- PCIe CARD (left) -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="30" y="60" width="270" height="420" rx="6" fill="url(#cardGrad)" stroke="#3949AB" stroke-width="2"/>
    <text x="165" y="85" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="#1A237E">KARTA SIECIOWA PCIe</text>
    <line x1="40" y1="95" x2="290" y2="95" stroke="#3949AB" stroke-width="1"/>

    <!-- PF -->
    <rect x="50" y="108" width="230" height="58" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
    <text x="165" y="128" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="bold" fill="#E65100">PF (Physical Function)</text>
    <text x="165" y="144" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">MAC: 00:1a:2b:3c:4d:5e</text>
    <text x="165" y="157" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Tx/Rx Queue (gospodarz)</text>

    <!-- VF0 -->
    <rect x="50" y="178" width="230" height="52" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="165" y="196" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="bold" fill="#2E7D32">VF0</text>
    <text x="165" y="211" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">MAC: 00:1a:2b:3c:4d:f0</text>
    <text x="165" y="224" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Tx/Rx Queue</text>

    <!-- VF1 -->
    <rect x="50" y="240" width="230" height="52" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="165" y="258" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="bold" fill="#2E7D32">VF1</text>
    <text x="165" y="273" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">MAC: 00:1a:2b:3c:4d:f1</text>
    <text x="165" y="286" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Tx/Rx Queue</text>

    <!-- VF2 -->
    <rect x="50" y="302" width="230" height="52" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="165" y="320" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="bold" fill="#2E7D32">VF2</text>
    <text x="165" y="335" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">MAC: 00:1a:2b:3c:4d:f2</text>
    <text x="165" y="348" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Tx/Rx Queue</text>

    <!-- VF3 -->
    <rect x="50" y="364" width="230" height="52" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
    <text x="165" y="382" text-anchor="middle" font-family="Consolas, monospace" font-size="11" font-weight="bold" fill="#2E7D32">VF3</text>
    <text x="165" y="397" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">MAC: 00:1a:2b:3c:4d:f3</text>
    <text x="165" y="410" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Tx/Rx Queue</text>

    <!-- PCIe bus label -->
    <text x="165" y="440" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#666">PCI Express Bus</text>
    <line x1="100" y1="447" x2="230" y2="447" stroke="#666" stroke-width="1"/>
  </g>

  <!-- Annotations for PF -->
  <text x="315" y="130" font-family="Consolas, monospace" font-size="8.5" fill="#E65100" font-style="italic">Physical Function –</text>
  <text x="315" y="143" font-family="Consolas, monospace" font-size="8.5" fill="#E65100" font-style="italic">główny interfejs, widoczny</text>
  <text x="315" y="156" font-family="Consolas, monospace" font-size="8.5" fill="#E65100" font-style="italic">dla systemu gospodarza</text>

  <!-- Annotation for VFs -->
  <text x="315" y="210" font-family="Consolas, monospace" font-size="8.5" fill="#2E7D32" font-style="italic">Virtual Function –</text>
  <text x="315" y="223" font-family="Consolas, monospace" font-size="8.5" fill="#2E7D32" font-style="italic">bezpośrednio przypisana do VM,</text>
  <text x="315" y="236" font-family="Consolas, monospace" font-size="8.5" fill="#2E7D32" font-style="italic">brak udziału hypervisora</text>

  <!-- ============================================================ -->
  <!-- HYPERVISOR (center) -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="420" y="60" width="200" height="420" rx="6" fill="url(#hyperGrad)" stroke="#1565C0" stroke-width="2"/>
    <text x="520" y="85" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="bold" fill="#0D47A1">HYPERVISOR</text>
    <line x1="430" y1="95" x2="610" y2="95" stroke="#1565C0" stroke-width="1"/>

    <text x="520" y="120" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="bold" fill="#1565C0">KVM / VMware / Hyper-V</text>

    <line x1="430" y1="130" x2="610" y2="130" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,3"/>

    <text x="520" y="150" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#444">VMM (Virtual Machine Monitor)</text>

    <rect x="435" y="165" width="170" height="28" rx="3" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
    <text x="520" y="184" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565C0">Scheduler CPU</text>

    <rect x="435" y="200" width="170" height="28" rx="3" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
    <text x="520" y="219" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565C0">Memory Manager</text>

    <rect x="435" y="235" width="170" height="28" rx="3" fill="#BBDEFB" stroke="#64B5F6" stroke-width="1"/>
    <text x="520" y="254" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#1565C0">IOMMU (VT-d/AMD-Vi)</text>

    <line x1="430" y1="275" x2="610" y2="275" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,3"/>

    <text x="520" y="298" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Sterownik PF (gospodarz)</text>
    <rect x="440" y="308" width="160" height="22" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="520" y="323" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#E65100">ndis / enp0s1f0</text>

    <line x1="430" y1="340" x2="610" y2="340" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,3"/>

    <text x="520" y="358" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Sterownik VF (passthrough)</text>
    <rect x="440" y="368" width="160" height="22" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="520" y="383" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#2E7D32">vfio-pci / pci-stub</text>

    <line x1="430" y1="400" x2="610" y2="400" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,3"/>

    <text x="520" y="420" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Przepływ sterowania (kontrola)</text>
    <rect x="440" y="428" width="160" height="22" rx="3" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
    <text x="520" y="443" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#1565C0">API zarządzania VM</text>
  </g>

  <!-- ============================================================ -->
  <!-- VIRTUAL MACHINES (right) -->
  <!-- ============================================================ -->
  <!-- VM1 -->
  <g filter="url(#shadow)">
    <rect x="700" y="60" width="220" height="90" rx="6" fill="url(#vmGrad)" stroke="#2E7D32" stroke-width="2"/>
    <text x="810" y="82" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#1B5E20">VM1 – Ubuntu Server</text>
    <text x="810" y="99" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Gość: system operacyjny + aplikacja</text>
    <line x1="710" y1="107" x2="910" y2="107" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="810" y="122" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Sterownik VF0 – enp0s2</text>
    <text x="810" y="137" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#2E7D32">00:1a:2b:3c:4d:f0</text>
  </g>

  <!-- VM2 -->
  <g filter="url(#shadow)">
    <rect x="700" y="160" width="220" height="90" rx="6" fill="url(#vmGrad)" stroke="#2E7D32" stroke-width="2"/>
    <text x="810" y="182" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#1B5E20">VM2 – Windows Server</text>
    <text x="810" y="199" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Gość: system operacyjny + aplikacja</text>
    <line x1="710" y1="207" x2="910" y2="207" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="810" y="222" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Sterownik VF1 – Ethernet</text>
    <text x="810" y="237" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#2E7D32">00:1a:2b:3c:4d:f1</text>
  </g>

  <!-- VM3 -->
  <g filter="url(#shadow)">
    <rect x="700" y="260" width="220" height="90" rx="6" fill="url(#vmGrad)" stroke="#2E7D32" stroke-width="2"/>
    <text x="810" y="282" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#1B5E20">VM3 – CentOS</text>
    <text x="810" y="299" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Gość: system operacyjny + aplikacja</text>
    <line x1="710" y1="307" x2="910" y2="307" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="810" y="322" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Sterownik VF2 – enp0s2</text>
    <text x="810" y="337" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#2E7D32">00:1a:2b:3c:4d:f2</text>
  </g>

  <!-- VM4 -->
  <g filter="url(#shadow)">
    <rect x="700" y="360" width="220" height="90" rx="6" fill="url(#vmGrad)" stroke="#2E7D32" stroke-width="2"/>
    <text x="810" y="382" text-anchor="middle" font-family="Consolas, monospace" font-size="12" font-weight="bold" fill="#1B5E20">VM4 – FreeBSD</text>
    <text x="810" y="399" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#555">Gość: system operacyjny + aplikacja</text>
    <line x1="710" y1="407" x2="910" y2="407" stroke="#A5D6A7" stroke-width="0.5"/>
    <text x="810" y="422" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#888">Sterownik VF3 – igb</text>
    <text x="810" y="437" text-anchor="middle" font-family="Consolas, monospace" font-size="9" fill="#2E7D32">00:1a:2b:3c:4d:f3</text>
  </g>

  <!-- ============================================================ -->
  <!-- ARROWS: card -> hypervisor (for PF) -->
  <!-- ============================================================ -->
  <line x1="300" y1="108" x2="420" y2="108" stroke="#F9A825" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="360" y="103" text-anchor="middle" font-family="Consolas, monospace" font-size="7" fill="#E65100">sterowanie PF</text>

  <line x1="300" y1="135" x2="420" y2="135" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrowControl)"/>

  <!-- ============================================================ -->
  <!-- ARROWS: card -> VM (bypass hypervisor) for VFs -->
  <!-- ============================================================ -->

  <!-- VF0 -> VM1 (direct) -->
  <line x1="280" y1="204" x2="700" y2="105" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arrowDirect)"/>
  <text x="490" y="145" text-anchor="middle" font-family="Consolas, monospace" font-size="9" font-weight="bold" fill="#2E7D32">Dane VF0 → VM1</text>
  <text x="490" y="157" text-anchor="middle" font-family="Consolas, monospace" font-size="7" fill="#555">(z pominięciem hypervisora)</text>

  <!-- VF1 -> VM2 (direct) -->
  <line x1="280" y1="266" x2="700" y2="205" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arrowDirect)"/>
  <text x="490" y="236" text-anchor="middle" font-family="Consolas, monospace" font-size="9" font-weight="bold" fill="#2E7D32">Dane VF1 → VM2</text>

  <!-- VF2 -> VM3 (direct) -->
  <line x1="280" y1="328" x2="700" y2="305" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arrowDirect)"/>
  <text x="490" y="317" text-anchor="middle" font-family="Consolas, monospace" font-size="9" font-weight="bold" fill="#2E7D32">Dane VF2 → VM3</text>

  <!-- VF3 -> VM4 (direct) -->
  <line x1="280" y1="390" x2="700" y2="405" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arrowDirect)"/>
  <text x="490" y="396" text-anchor="middle" font-family="Consolas, monospace" font-size="9" font-weight="bold" fill="#2E7D32">Dane VF3 → VM4</text>

  <!-- ============================================================ -->
  <!-- bypass cross annotation -->
  <!-- ============================================================ -->
  <line x1="520" y1="260" x2="520" y2="350" stroke="#B71C1C" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="525" y="308" font-family="Consolas, monospace" font-size="8" fill="#B71C1C">← brak</text>
  <text x="525" y="320" font-family="Consolas, monospace" font-size="8" fill="#B71C1C">   pośrednictwa</text>

  <!-- ============================================================ -->
  <!-- TERMINAL at bottom -->
  <!-- ============================================================ -->
  <g filter="url(#shadow)">
    <rect x="180" y="500" width="920" height="130" rx="6" fill="url(#termGrad)" stroke="#37474F" stroke-width="2"/>

    <!-- Terminal title bar -->
    <rect x="180" y="500" width="920" height="24" rx="6" fill="#37474F"/>
    <rect x="180" y="518" width="920" height="6" fill="#37474F"/>
    <circle cx="205" cy="512" r="5" fill="#E53935"/>
    <circle cx="222" cy="512" r="5" fill="#FDD835"/>
    <circle cx="239" cy="512" r="5" fill="#43A047"/>
    <text x="640" y="516" text-anchor="middle" font-family="Consolas, monospace" font-size="10" fill="#ECEFF1">Terminal — konfiguracja SR-IOV</text>

    <!-- Command line 1 -->
    <text x="200" y="548" font-family="Courier New, monospace" font-size="12" fill="#A5D6A7">$ lspci -v | grep -i ethernet</text>
    <text x="200" y="566" font-family="Courier New, monospace" font-size="11" fill="#90CAF9">02:00.0 Ethernet controller: Intel I350 (rev 01)</text>
    <text x="200" y="582" font-family="Courier New, monospace" font-size="11" fill="#90CAF9">    Capabilities: [a4] SR-IOV – 8 VFs supported</text>

    <!-- Command line 2 -->
    <text x="200" y="606" font-family="Courier New, monospace" font-size="12" fill="#A5D6A7">$ echo 4 &gt; /sys/class/net/eth0/device/sriov_numvfs</text>
    <text x="200" y="624" font-family="Courier New, monospace" font-size="11" fill="#90CAF9">4 Virtual Functions created on eth0 (PF: enp0s1f0)</text>
  </g>

  <!-- Bottom legend -->
  <text x="640" y="695" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#999">SR-IOV – sprzętowa wirtualizacja I/O. Każda VF ma własną przestrzeń PCIe, MAC i kolejki Tx/Rx.</text>
</svg>
